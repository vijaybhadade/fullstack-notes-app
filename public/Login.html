<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note App - Sign In</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="brand-header">
                
            <span class="brand-name">NOTE<span class="brand-accent">APP</span></span>
        </div>

        <main class="login-card">
            <h1>Sign In</h1>
            
            <form method="POST" id="loginForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </span>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        </span>
                        <input type="password" id="password" name="password" placeholder="••••••••••••" required autocomplete="current-password">
                    </div>
                    <div class="forgot-password-align">
                        <a href="#" class="text-link">Forgot Password?</a>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Sign In</button>

                <div class="form-utilities">
                    <label class="checkbox-container">
                        <input type="checkbox" name="remember">
                        <span class="checkmark"></span>
                        <span class="label-text">Remember Me <span class="subtext">Keep me signed in</span></span>
                    </label>
                </div>
            </form>

            <div class="card-footer">
                <p>Don't have an account? <a href="Register.html" class="text-link highlight">Sign Up</a></p>
            </div>
        </main>
    </div>
</body>
<script src="js/script.js"></script>
</html>
