<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register page</title>
    <link rel="stylesheet" href="css/Register.css">
</head>
<body>
    <h1 id="main">Sign Up </h1>
    <form id="Form"  >
       <h2>Create Account</h2>
       <label for="Username">Name </label>  <input type="text" placeholder="Enter username" id="Username" name="Name"> 
       <label for="Email">Email </label> <input type="email" placeholder="abc@123" id="Email" name="Email">
       <label for="Age">Age </label> <input type="number" placeholder="Enter current age" id="Age" name="Age">
       <label for="Password">Password</label>  <input type="password" placeholder="••••••••••••" id="Password" name="Password">
       <label for="Confirm-Password">Confirm Password </label> <input type="password" placeholder="••••••••••••" id="Confirm-Password" name="Confirm-Password"> 
       <div id="btn-group">
        <button  type="submit" id="Register">Sign Up</button> 
       <button type="button" id="Login">Sign In</button>
    </div>
    </form>
    <script src="js/Register.js"></script>
</body>
</html>
